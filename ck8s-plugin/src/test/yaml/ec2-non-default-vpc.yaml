version: "0.12"
provider: "aws"
authentication: credentials
configuration:
  accessKey: "${crypto.exportAsString(projectInfo.orgName, 'cicd-automation-awsAccessKey', null)}"
  secretKey: "${crypto.exportAsString(projectInfo.orgName, 'cicd-automation-awsSecretKey', null)}"
  region: "us-east-2"
  #vpcName: "github-actions"
  tags:
    provisio.bucketPath: "s3://myco-artifacts/releases"
    provisio.installerProfile: "myco-concord-agent"
    provisio.applicationCoordinate: "com.myco.github:github-actions-runner:tar.gz:1.0.0"
resources:
  - type: ec2
    variables:
      vpc_name: "github-actions"
      ec2_instance_name: "github-actions-jvz"
      ec2_instance_type: "m5.xlarge"
      ec2_instance_profile: "ConcordCICDWorker"
      ec2_keypair: "automation"
      ec2_user_data: "provisio.sh"
      ec2_root_block_device_size: 50
