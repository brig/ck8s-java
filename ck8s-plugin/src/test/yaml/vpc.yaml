version: 0.12
provider: aws
authentication: credentials
configuration:
  aws_region: us-east-2
  aws_access_key: "xxx"
  aws_secret_key: "yyy"
  tags:
    creator: concord
    session: jvz-001
resources:
  - type: vpc
    variables:
      vpc_name: jvz-vpc
      vpc_cidr: 10.206.0.0/18
      public_subnet_list:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      private_subnet_list:
        - us-east-2a
        - us-east-2b
        - us-east-2c
  - type: eks
    variables:
      cluster_name: jvz-cluster
